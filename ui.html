<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI;
}

/* Background */

.stApp{
    background: linear-gradient(-45deg,#020617,#0f172a,#0ea5e9,#1e293b);
    background-size:400% 400%;
    animation:gradientBG 12s ease infinite;
    color:white;
}

/* Animation */

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Navbar */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    margin-bottom:30px;
}

.logo{
    font-size:32px;
    font-weight:bold;
    color:#38bdf8;
}

/* Hero */

.hero{
    text-align:center;
    margin-top:40px;
}

.hero h1{
    font-size:60px;
    color:white;
}

.hero p{
    color:#cbd5e1;
    margin-top:10px;
}

/* Widgets */

.widgets{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:50px;
}

.widget{
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:15px;
    backdrop-filter:blur(10px);
}

/* Chat */

.chat-box{
    padding:18px;
    border-radius:15px;
    margin-top:15px;
    color:white;
}

.user{
    background:rgba(59,130,246,0.25);
    border-left:5px solid #3b82f6;
}

.ai{
    background:rgba(34,197,94,0.25);
    border-left:5px solid #22c55e;
}

</style>

<div class="navbar">

<div class="logo">
🤖 AI Assistant
</div>

</div>

<div class="hero">

<h1>AI Study Assistant</h1>

<p>
Smart learning powered by Burhan UD DIN Hashmi
</p>

</div>

<div class="widgets">

<div class="widget">
<h3>📚 Study Help</h3>
<p>Get answers instantly.</p>
</div>

<div class="widget">
<h3>⚡ Fast Responses</h3>
<p>Powered by Google Gemini.</p>
</div>

<div class="widget">
<h3>🧠 AI Memory</h3>
<p>Understands conversation context.</p>
</div>

</div>
